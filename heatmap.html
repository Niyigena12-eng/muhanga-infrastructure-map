<!DOCTYPE html>
<html>
<head>
    <title>Kigali Population Density Heatmap</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Layout Key Style Matching Screenshot */
        .legend {
            padding: 10px 15px;
            font: 13px Arial, sans-serif;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            line-height: 22px;
            color: #333;
        }
        .legend h4 {
            margin: 0 0 5px;
            font-size: 14px;
            color: #000;
        }
        .legend i {
            width: 12px;
            height: 12px;
            float: left;
            margin-top: 5px;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <script>
        // Initialize Map centered on Kigali City
        var map = L.map('map').setView([-1.9550, 30.0600], 12);

        // Standard OpenStreetMap base layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Map intensity configuration rules based on census classifications
        function getIntensity(density) {
            switch(density) {
                case 'High density': return 1.2;
                case 'Medium-high':  return 0.9;
                case 'Medium':       return 0.6;
                case 'Medium-low':   return 0.4;
                case 'Low density':  return 0.2;
                default:             return 0.5;
            }
        }

        // Fetch your dynamic geojson data file
        fetch('muhanga_centroids.geojson')
            .then(response => response.json())
            .then(data => {
                var heatPoints = [];

                data.features.forEach(function(feature) {
                    var coords = feature.geometry.coordinates;
                    var props = feature.properties;
                    
                    // Leaflet expects [Lat, Lng] layout order
                    var lat = coords[1];
                    var lng = coords[0];
                    var intensity = getIntensity(props.Density);

                    // Add markers with custom popups
                    L.marker([lat, lng])
                        .addTo(map)
                        .bindPopup("<b>" + props.Sector + " Sector</b><br>Classification: " + props.Density);

                    // Append data array to heatmap generator
                    heatPoints.push([lat, lng, intensity]);
                });

                // Generate Heatmap Overlay layer matching layout specifications
                L.heatLayer(heatPoints, {
                    radius: 35,
                    blur: 20,
                    maxZoom: 13,
                    gradient: {0.2: 'blue', 0.4: 'cyan', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red'}
                }).addTo(map);
            });

        // Add matching Legend panel overlay to top-right corner
        var legend = L.control({position: 'topright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>Kigali Population Density</h4>';
            div.innerHTML += '<small>2022 Census | 35 Sectors</small><br>';
            div.innerHTML += '<i style="background: red"></i> High density<br>';
            div.innerHTML += '<i style="background: yellow"></i> Medium-high<br>';
            div.innerHTML += '<i style="background: lime"></i> Medium<br>';
            div.innerHTML += '<i style="background: cyan"></i> Medium-low<br>';
            div.innerHTML += '<i style="background: blue"></i> Low density<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
