<!DOCTYPE html>
<html>
<head>
    <title>Muhanga Population Density Heatmap</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Style for the Top Legend */
        .legend {
            padding: 10px 15px;
            font: 14px/16px Arial, Helvetica, sans-serif;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            line-height: 20px;
            color: #333;
        }
        .legend h4 {
            margin: 0 0 5px;
            color: #111;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <script>
        // 1. Initialize Map centered on Muhanga District
        var map = L.map('map').setView([-2.0794, 29.7422], 13);

        // 2. Add the Clean, Light Background (Standard OpenStreetMap Style)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // 3. Muhanga Sector Data Points directly inside the script
        var muhangaData = [
            { name: "Nyamabuye", lat: -2.0794, lng: 29.7422, count: 45000 },
            { name: "Shyogwe", lat: -2.1050, lng: 29.7615, count: 41000 },
            { name: "Cyeza", lat: -2.0520, lng: 29.7850, count: 32000 }
        ];

        // 4. Create Heatmap Arrays
        var heatPoints = [];
        
        // 5. Add Point Markers and Prepare Heatmap Data
        muhangaData.forEach(function(sector) {
            // Add a standard pin marker for each sector center
            L.marker([sector.lat, sector.lng])
                .addTo(map)
                .bindPopup("<b>" + sector.name + " Sector</b><br>Estimated Population: " + sector.count);

            // Add to heatmap array (Lat, Lng, Intensity based on population scale)
            heatPoints.push([sector.lat, sector.lng, sector.count / 10000]);
        });

        // 6. Add the Heatmap Layer over the map
        var heat = L.heatLayer(heatPoints, {
            radius: 40,
            blur: 25,
            maxZoom: 15,
            gradient: {0.4: 'blue', 0.6: 'cyan', 0.7: 'lime', 0.8: 'yellow', 1.0: 'red'}
        }).addTo(map);

        // 7. Add the Top-Right Legend Box
        var legend = L.control({position: 'topright'});

        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>Population Density</h4>';
            div.innerHTML += '<i style="background: red"></i> High Density<br>';
            div.innerHTML += '<i style="background: yellow"></i> Medium-High<br>';
            div.innerHTML += '<i style="background: lime"></i> Medium<br>';
            div.innerHTML += '<i style="background: cyan"></i> Medium-Low<br>';
            div.innerHTML += '<i style="background: blue"></i> Low Density<br>';
            return div;
        };

        legend.addTo(map);
    </script>
</body>
</html>
